<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shadow Comparison — Agent A vs Agent B</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f1f5f9; color: #1e293b; padding: 24px; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 20px; }
    .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 20px; }
    .controls label { font-size: 0.85rem; color: #475569; }
    .controls select, .controls button { font-size: 0.85rem; padding: 6px 12px; border-radius: 6px; border: 1px solid #cbd5e1; background: white; cursor: pointer; }
    .controls button { background: #0e7490; color: white; border-color: #0e7490; font-weight: 600; }
    .controls button:hover { background: #0c6478; }
    .run-card { background: white; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 16px; overflow: hidden; }
    .run-header { background: #1e293b; color: white; padding: 10px 16px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
    .run-header .run-id { font-family: monospace; font-size: 0.8rem; color: #94a3b8; }
    .run-header .ts { font-size: 0.8rem; color: #94a3b8; }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge { font-size: 0.72rem; font-weight: 600; padding: 2px 8px; border-radius: 99px; }
    .badge.green { background: #dcfce7; color: #14532d; }
    .badge.red { background: #fee2e2; color: #7f1d1d; }
    .badge.blue { background: #dbeafe; color: #1e3a5f; }
    .badge.gray { background: #f1f5f9; color: #475569; }
    .comparison { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #e2e8f0; }
    .col-header { padding: 8px 16px; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
    .col-header.b { border-left: 1px solid #e2e8f0; }
    .highlight-row { display: contents; }
    .cell { padding: 8px 16px; font-size: 0.83rem; border-bottom: 1px solid #f1f5f9; line-height: 1.4; }
    .cell.b { border-left: 1px solid #e2e8f0; }
    .cell.match { background: #f0fdf4; }
    .cell.diff { background: #fff7ed; }
    .cell.empty { color: #94a3b8; font-style: italic; }
    .no-data { padding: 16px; font-size: 0.85rem; color: #94a3b8; font-style: italic; }
    .summary { padding: 10px 16px; background: #f8fafc; border-top: 1px solid #e2e8f0; font-size: 0.78rem; color: #64748b; }
    .empty-state { text-align: center; padding: 48px; color: #94a3b8; }
    .empty-state h2 { font-size: 1rem; margin-bottom: 8px; }
    .total-note { font-size: 0.78rem; color: #94a3b8; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h1>Shadow Comparison — Agent A vs Agent B</h1>
  <p class="subtitle">Agent A = main pipeline (ToT ranking). Agent B = shadow single-pass alternative. Never shown to user until promoted.</p>

  <div class="controls">
    <label>Show last <select id="tail">
      <option value="5">5 runs</option>
      <option value="10" selected>10 runs</option>
      <option value="20">20 runs</option>
      <option value="50">50 runs</option>
    </select></label>
    <button onclick="load()">Refresh</button>
    <span id="status" style="font-size:0.8rem;color:#64748b;"></span>
  </div>

  <div id="total-note" class="total-note"></div>
  <div id="runs"></div>

  <script>
    async function load() {
      const tail = document.getElementById("tail").value;
      document.getElementById("status").textContent = "Loading…";
      try {
        const res = await fetch(`/api/shadow/comparison?tail=${tail}`);
        const data = await res.json();
        document.getElementById("status").textContent = "";
        render(data);
      } catch (e) {
        document.getElementById("status").textContent = "Error: " + e.message;
      }
    }

    function render(data) {
      const { runs, total } = data;
      document.getElementById("total-note").textContent =
        total > 0 ? `Showing ${runs.length} of ${total} total runs on record.` : "";

      const container = document.getElementById("runs");
      if (!runs || runs.length === 0) {
        container.innerHTML = `<div class="empty-state"><h2>No shadow runs logged yet</h2><p>Run a digest to generate shadow comparison data.</p></div>`;
        return;
      }

      container.innerHTML = [...runs].reverse().map(rec => {
        const ts = (rec.timestamp_utc || "").slice(0, 19).replace("T", " ") + " UTC";
        const runId = (rec.run_id || "unknown").slice(0, 8);
        const overlap = typeof rec.overlap_ratio === "number" ? (rec.overlap_ratio * 100).toFixed(0) + "%" : "?";
        const ordering = rec.ordering_changes ?? "?";
        const confidence = rec.confidence || "?";
        const schemaValid = rec.schema_valid;
        const timedOut = rec.timed_out;
        const error = rec.error || "";

        const aItems = rec.agent_a_highlights || [];
        const bItems = rec.agent_b_highlights || [];

        const badgeSchema = schemaValid
          ? `<span class="badge green">schema ✓</span>`
          : `<span class="badge red">schema ✗</span>`;
        const badgeTimeout = timedOut ? `<span class="badge red">timed out</span>` : "";
        const badgeOverlap = `<span class="badge blue">overlap ${overlap}</span>`;
        const badgeConf = `<span class="badge gray">confidence: ${confidence}</span>`;
        const badgeOrdering = `<span class="badge gray">ordering Δ${ordering}</span>`;

        const hasHighlights = aItems.length > 0 || bItems.length > 0;
        const maxRows = Math.max(aItems.length, bItems.length);

        let rows = "";
        if (!hasHighlights) {
          rows = `<div class="no-data">No highlight text logged for this run (older record).</div>`;
        } else {
          for (let i = 0; i < maxRows; i++) {
            const a = aItems[i] || "";
            const b = bItems[i] || "";
            const isMatch = a.trim().toLowerCase() === b.trim().toLowerCase() && a.trim() !== "";
            const cls = isMatch ? "match" : "diff";
            rows += `
              <div class="highlight-row">
                <div class="cell ${cls} ${!a ? 'empty' : ''}">${a || "(none)"}</div>
                <div class="cell b ${cls} ${!b ? 'empty' : ''}">${b || "(none)"}</div>
              </div>`;
          }
        }

        return `
          <div class="run-card">
            <div class="run-header">
              <span class="run-id">${runId}</span>
              <span class="ts">${ts}</span>
              <div class="badges">${badgeSchema}${badgeTimeout}${badgeOverlap}${badgeOrdering}${badgeConf}</div>
              ${error ? `<span style="font-size:0.75rem;color:#fca5a5">${error.slice(0,80)}</span>` : ""}
            </div>
            <div class="comparison">
              <div class="col-header">Agent A — main pipeline (ToT)</div>
              <div class="col-header b">Agent B — shadow (single-pass)</div>
              ${rows}
            </div>
          </div>`;
      }).join("");
    }

    load();
  </script>
</body>
</html>
